name: Contact Form Health Check

on:
  schedule:
    - cron: "0 */12 * * *"   # Runs every 12 hours
  workflow_dispatch:
  # Run when contact-form related files change
  push:
    paths:
      - 'components/contact/**'
      - 'app/api/contact/**'
      - 'tests/e2e/contact-form-email-verification.spec.ts'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Contact Form E2E Tests
        run: npx playwright test tests/e2e/contact-form-email-verification.spec.ts --project=chromium
        env:
          # Required for email delivery verification test.
          # Without TEST_BASE_URL the email delivery test is automatically skipped.
          # Add TEST_BASE_URL as a repo secret (e.g. https://ampvendingmachines.com)
          # to enable full email delivery verification against production.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_BASE_URL: ${{ secrets.TEST_BASE_URL }}

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
