name: CI/CD Pipeline

on:
  # Run on PRs to main (validates before merge)
  pull_request:
    branches: [main]
  # Run on push to main (validates after merge)
  push:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm run test:ci:no-coverage

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://www.ampvendingmachines.com' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

  # Note: Deployment is handled automatically by Vercel
  # No separate deploy job needed
